<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Approvals — Remti</title>
<link rel="stylesheet" href="styles.css"/>
<style>
  body { background: var(--bg); }
  .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  @media (max-width: 980px) { .app { grid-template-columns: 1fr; } .sidebar { display:none; } }
  .sidebar {
    background: var(--bg); border-right: 1px solid var(--hair);
    padding: 20px 16px; position: sticky; top: 0; height: 100vh;
    display: flex; flex-direction: column;
  }
  .sb-section { margin-top: 24px; }
  .sb-section h5 { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--ink3); text-transform: uppercase; margin: 0 0 6px 10px; }
  .sb-link {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px;
    font-size: 14px; color: var(--ink2); font-weight: 500;
  }
  .sb-link:hover { background: var(--bg-elev); color: var(--ink); }
  .sb-link.active { background: var(--ink); color: #fff; }
  .sb-link .count { margin-left: auto; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 99px; background: var(--surface-alt); color: var(--ink3); }
  .sb-link.active .count { background: rgba(255,255,255,0.18); color: #fff; }
  .sb-link .ic { width: 16px; height: 16px; display: grid; place-items: center; }
  .sb-user { margin-top: auto; padding: 12px; background: var(--surface); border: 1px solid var(--hair); border-radius: 12px; display:flex; gap:10px; align-items:center; }

  .main { padding: 32px 40px; max-width: 1280px; }
  @media (max-width: 980px) { .main { padding: 24px; } }

  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-left h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }

  /* KPI strip */
  .kpi-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
  @media (max-width: 860px) { .kpi-strip { grid-template-columns: 1fr; } }
  .kpi-card {
    background: var(--surface); border: 1px solid var(--hair); border-radius: var(--r-lg); padding: 20px 24px;
  }
  .kpi-label { font-size: 12px; color: var(--ink3); font-weight: 500; margin-bottom: 6px; }
  .kpi-value { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
  .kpi-value.warn { color: var(--warn); }
  .kpi-sub { font-size: 12px; color: var(--ink3); margin-top: 4px; }

  /* Tabs */
  .tabs { display: flex; gap: 2px; background: var(--bg-elev); padding: 3px; border-radius: var(--r-pill); margin-bottom: 20px; width: fit-content; }
  .tabs .t { padding: 7px 16px; font-size: 13px; font-weight: 600; color: var(--ink3); border-radius: var(--r-pill); cursor: pointer; white-space: nowrap; transition: all 0.15s ease; }
  .tabs .t:hover { color: var(--ink2); }
  .tabs .t.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }
  .tabs .t .tc { font-size: 10px; font-weight: 700; opacity: 0.5; margin-left: 4px; }

  /* Table */
  .approval-table {
    width: 100%; border-collapse: separate; border-spacing: 0;
    background: var(--surface); border: 1px solid var(--hair); border-radius: var(--r-lg); overflow: hidden;
  }
  .approval-table th {
    text-align: left; padding: 12px 16px; font-size: 11px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink3);
    border-bottom: 1px solid var(--hair); background: var(--bg);
  }
  .approval-table th:nth-child(3),
  .approval-table td:nth-child(3) { text-align: right; }
  .approval-table th:last-child,
  .approval-table td:last-child { text-align: right; padding-right: 20px; }
  .approval-table td {
    padding: 14px 16px; font-size: 14px; border-bottom: 1px solid var(--hair); vertical-align: middle;
  }
  .approval-table tbody tr:last-child td { border-bottom: none; }
  .approval-table tbody tr { cursor: pointer; transition: background 0.12s; }
  .approval-table tbody tr:hover { background: var(--bg-elev); }

  .supplier-cell { display: flex; align-items: center; gap: 12px; }
  .supplier-cell .sc-info .sc-name { font-weight: 600; font-size: 14px; }
  .supplier-cell .sc-info .sc-cat { font-size: 12px; color: var(--ink3); }

  .amount-cell { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
  .amount-cell .amt { font-weight: 700; font-variant-numeric: tabular-nums; }

  .due-cell .due-date { font-weight: 500; }
  .due-cell .due-sub { font-size: 12px; margin-top: 1px; }
  .due-cell .due-sub.overdue { color: var(--danger); font-weight: 600; }
  .due-cell .due-sub.ok { color: var(--ink3); }

  .submitted-cell .sub-name { font-weight: 500; }
  .submitted-cell .sub-date { font-size: 12px; color: var(--ink3); }

  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--ink3); }
  .empty-state .es-icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state .es-title { font-size: 16px; font-weight: 600; color: var(--ink2); margin-bottom: 4px; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <a class="logo" href="/" style="font-size:17px;padding:4px 8px"><span class="logo-mark">R</span> Remti</a>
    <div style="margin-top:8px;padding:6px 10px;font-size:12px;color:var(--ink3)">Harbert &amp; Co &middot; Ltd</div>
    <div class="sb-section"><h5>Workspace</h5>
      <a class="sb-link" href="/dashboard"><span class="ic">&#8962;</span>Dashboard</a>
      <a class="sb-link" href="/invoices"><span class="ic">&#9776;</span>Invoices<span class="count">17</span></a>
      <a class="sb-link active" href="/approvals"><span class="ic">&#10003;</span>Approvals<span class="count">3</span></a>
      <a class="sb-link" href="/payrun"><span class="ic">&#9889;</span>Pay run</a>
      <a class="sb-link" href="/suppliers"><span class="ic">&#128101;</span>Suppliers</a>
      <a class="sb-link" href="/reports"><span class="ic">&#9636;</span>Reports</a>
    </div>
    <div class="sb-section"><h5>Setup</h5>
      <a class="sb-link" href="/bank-accounts"><span class="ic">&#8862;</span>Bank accounts</a>
      <a class="sb-link" href="/integrations"><span class="ic">&#8644;</span>Integrations</a>
      <a class="sb-link" href="/settings"><span class="ic">&#9881;</span>Settings</a>
    </div>
    <div class="sb-user" style="cursor:pointer" onclick="logout()" title="Click to log out">
      <div class="avatar" style="background:var(--sup-blue);width:32px;height:32px">JM</div>
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">Jordan Morgan</div><div style="font-size:11px;color:var(--ink3)">Log out &#8599;</div></div>
    </div>
  </aside>

  <main class="main" id="main"></main>
</div>

<script src="data.js"></script>
<script>
function logout() { window.location.href = '/login'; }

(function() {
  const approvals = DATA.approvals;
  const pending = approvals.filter(a => a.status === 'pending');
  const approved = approvals.filter(a => a.status === 'approved');
  const rejected = approvals.filter(a => a.status === 'rejected');
  const paid = approvals.filter(a => a.status === 'paid');
  const pendingValue = pending.reduce((s, a) => s + a.amount, 0);
  const main = document.getElementById('main');
  let activeTab = 'pending';

  function statusPillClass(s) {
    return s === 'pending' ? 'pill-warn' : s === 'approved' ? 'pill-positive' : s === 'rejected' ? 'pill-danger' : 'pill-positive';
  }
  function statusLabel(s) {
    if (s === 'paid') return '&#10003; Paid';
    return s.charAt(0).toUpperCase() + s.slice(1);
  }
  function actionBtn(a) {
    if (a.status === 'pending') return '<a href="/approval-detail?id=' + a.id + '" class="btn btn-primary btn-sm" onclick="event.stopPropagation()">Review</a>';
    if (a.status === 'approved') return '<a href="/payrun" class="btn btn-secondary btn-sm" onclick="event.stopPropagation()">Schedule payment</a>';
    if (a.status === 'rejected') return '<a href="/approval-detail?id=' + a.id + '" class="btn btn-secondary btn-sm" onclick="event.stopPropagation()">View</a>';
    return '<a href="/approval-detail?id=' + a.id + '" class="btn btn-ghost btn-sm" onclick="event.stopPropagation()">Receipt</a>';
  }

  function render() {
    var counts = { pending: pending.length, approved: approved.length, rejected: rejected.length, paid: paid.length };
    var lists = { pending: pending, approved: approved, rejected: rejected, paid: paid };
    var currentList = lists[activeTab];
    var urgentCount = pending.filter(function(a) { return a.urgent; }).length;

    var html = '<div class="topbar">' +
      '<div class="topbar-left">' +
        '<h1>Approvals</h1>' +
        '<span class="pill pill-warn pill-dot">' + pending.length + ' pending</span>' +
      '</div>' +
      '<a href="/settings" class="btn btn-secondary">Approval settings</a>' +
    '</div>' +

    '<div class="kpi-strip">' +
      '<div class="kpi-card">' +
        '<div class="kpi-label">Pending approval</div>' +
        '<div class="kpi-value warn">' + pending.length + '</div>' +
        '<div class="kpi-sub">' + (urgentCount > 0 ? urgentCount + ' urgent' : 'None urgent') + '</div>' +
      '</div>' +
      '<div class="kpi-card">' +
        '<div class="kpi-label">Approved this month</div>' +
        '<div class="kpi-value">' + approved.length + '</div>' +
        '<div class="kpi-sub">Ready for payment</div>' +
      '</div>' +
      '<div class="kpi-card">' +
        '<div class="kpi-label">Total pending value</div>' +
        '<div class="kpi-value">' + fmt(pendingValue) + '</div>' +
        '<div class="kpi-sub">' + pending.length + ' invoice' + (pending.length !== 1 ? 's' : '') + ' awaiting review</div>' +
      '</div>' +
    '</div>' +

    '<div class="tabs" id="tabs">' +
      ['pending','approved','rejected','paid'].map(function(t) {
        return '<div class="t ' + (activeTab===t?'active':'') + '" data-tab="' + t + '">' + t.charAt(0).toUpperCase() + t.slice(1) + '<span class="tc">' + counts[t] + '</span></div>';
      }).join('') +
    '</div>';

    if (currentList.length === 0) {
      html += '<div class="empty-state">' +
        '<div class="es-icon">' + (activeTab==='rejected'?'&#10005;':'&#10003;') + '</div>' +
        '<div class="es-title">No ' + activeTab + ' approvals</div>' +
        '<div>All caught up here.</div>' +
      '</div>';
    } else {
      html += '<table class="approval-table"><thead><tr>' +
        '<th>Supplier</th><th>Invoice #</th><th>Amount</th><th>Due date</th><th>Submitted by</th><th>Status</th><th>Action</th>' +
      '</tr></thead><tbody>';

      currentList.forEach(function(a) {
        var isOverdue = a.dueIn && a.dueIn.indexOf('overdue') !== -1;
        html += '<tr onclick="window.location.href=\'/approval-detail?id=' + a.id + '\'">' +
          '<td><div class="supplier-cell">' +
            '<div class="avatar" style="background:' + a.supplierColor + '">' + a.supplierInitial + '</div>' +
            '<div class="sc-info"><div class="sc-name">' + a.supplierName + '</div><div class="sc-cat">' + a.category + '</div></div>' +
          '</div></td>' +
          '<td style="font-weight:500;font-variant-numeric:tabular-nums">' + a.invoiceNumber + '</td>' +
          '<td><div class="amount-cell">' +
            (a.urgent ? '<span class="pill pill-danger" style="font-size:10px;padding:3px 7px">URGENT</span>' : '') +
            '<span class="amt">' + fmt(a.amount) + '</span>' +
          '</div></td>' +
          '<td><div class="due-cell"><div class="due-date">' + a.due + '</div><div class="due-sub ' + (isOverdue ? 'overdue' : 'ok') + '">' + a.dueIn + '</div></div></td>' +
          '<td><div class="submitted-cell"><div class="sub-name">' + a.submittedBy + '</div><div class="sub-date">' + a.submittedAt.split(',')[0] + '</div></div></td>' +
          '<td><span class="pill pill-dot ' + statusPillClass(a.status) + '">' + statusLabel(a.status) + '</span></td>' +
          '<td>' + actionBtn(a) + '</td>' +
        '</tr>';
      });

      html += '</tbody></table>';
    }

    main.innerHTML = html;

    document.querySelectorAll('#tabs .t').forEach(function(el) {
      el.addEventListener('click', function() {
        activeTab = el.dataset.tab;
        render();
      });
    });
  }

  render();
})();
</script>
</body>
</html>
